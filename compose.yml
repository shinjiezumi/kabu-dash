services:
  nginx:
    build:
      context: ./docker/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/certbot/conf:/etc/letsencrypt
    environment:
      - NGINX_SERVER_NAME=${NGINX_SERVER_NAME:-localhost}
    depends_on:
      - app

  app:
    build:
      context: ./docker/php
    volumes:
      - ./src:/var/www/html
    depends_on:
      - postgresql

  postgresql:
    build:
      context: ./docker/postgresql
    environment:
      POSTGRES_DB: ${DB_DATABASE:-kabu_dash}
      POSTGRES_USER: ${DB_USERNAME:-kabu_dash}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - ./docker/postgresql/data/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  certbot:
    image: certbot/certbot
    volumes:
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/certbot/conf:/etc/letsencrypt
    profiles:
      - certbot
